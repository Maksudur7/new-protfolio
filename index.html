<!doctype html>
<html lang="en">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Page title -->
  <title>Maksudur Rahaman</title>
  <meta name="description" content="Portfolio website of Maksudur Rahaman" />
  <meta name="author" content="Maksudur Rahaman" />

  <!-- Favicon (tab icon) -->
  <link rel="icon" type="image/png" sizes="16x16" href="https://i.ibb.co/BVDnCdBY/your-image-round-16.png" />

  <!-- Open Graph / Facebook -->
  <meta property="og:title" content="Maksudur Rahaman Portfolio" />
  <meta property="og:description" content="Portfolio website of Maksudur Rahaman" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://i.ibb.co/BVDnCdBY/your-image-name.jpg" />
  <meta property="og:image:type" content="image/jpeg" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://i.ibb.co/BVDnCdBY/your-image-name.jpg" />
  <meta name="twitter:site" content="@MaksudurRahaman" />

  <!-- Dark mode detect -->
  <script>
    (function () {
      try {
        var theme = localStorage.getItem("theme");
        if (theme === "system" || !theme) {
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          theme = prefersDark ? "dark" : "light";
        }
        document.documentElement.classList.add(theme);
      } catch (e) { }
    })();
  </script>

  <!-- CSS -->
  <link href="/src/index.css" rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
